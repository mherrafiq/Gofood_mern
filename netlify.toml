[build]
  command = "npm install --prefix mernapp --legacy-peer-deps && npm install --prefix mernapp/backend && CI=false npm run build --prefix mernapp"
  publish = "mernapp/build"

[functions]
  directory = "mernapp/backend"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/index/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
